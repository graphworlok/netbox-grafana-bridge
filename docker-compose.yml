version: "3.9"

services:
  netbox-grafana-bridge:
    build: .
    container_name: netbox-grafana-bridge
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      # ---- NetBox ----
      NETBOX_URL:   "${NETBOX_URL:-https://netbox.example.com}"
      NETBOX_TOKEN: "${NETBOX_TOKEN:-YOUR_TOKEN_HERE}"

      # ---- Grafana ----
      GRAFANA_URL: "${GRAFANA_URL:-https://grafana.example.com}"

      # Dashboard UIDs  (leave blank to skip linking for that object type)
      GRAFANA_DASHBOARD_DEVICE:    "${GRAFANA_DASHBOARD_DEVICE:-}"
      GRAFANA_DASHBOARD_INTERFACE: "${GRAFANA_DASHBOARD_INTERFACE:-}"
      GRAFANA_DASHBOARD_SITE:      "${GRAFANA_DASHBOARD_SITE:-}"
      GRAFANA_DASHBOARD_PREFIX:    "${GRAFANA_DASHBOARD_PREFIX:-}"
      GRAFANA_DASHBOARD_CIRCUIT:   "${GRAFANA_DASHBOARD_CIRCUIT:-}"

      # ---- Tuning ----
      NETBOX_TIMEOUT: "10"
      CACHE_TTL:      "60"
      BRIDGE_HOST:    "0.0.0.0"
      BRIDGE_PORT:    "8765"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
